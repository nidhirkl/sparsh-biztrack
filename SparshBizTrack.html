<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sparsh Boutique">
<title>Sparsh Boutique by Nidhi</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:#f0f7fa;overflow-x:hidden}
#app{max-width:500px;margin:0 auto;min-height:100vh}
#hdr{background:linear-gradient(135deg,#134f66,#1a6b8a);padding:14px 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(26,107,138,.25)}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr-name{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.3px}
.hdr-boutique{font-size:10px;color:rgba(255,255,255,.8);margin-top:1px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.55);margin-top:1px}
.hdr-badge{background:rgba(255,255,255,.15);border-radius:10px;padding:5px 12px;font-size:12px;color:#fff;font-weight:600;white-space:nowrap}
#bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;display:flex;background:#fff;border-top:1px solid #d4e6ed;box-shadow:0 -4px 20px rgba(26,107,138,.1);z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;background:none;border:none;cursor:pointer;font-family:inherit;color:#6b8899;border-top:2.5px solid transparent;font-size:10px;font-weight:500;gap:3px;transition:color .15s}
.nav-btn.active{color:#1a6b8a;border-top-color:#1a6b8a;font-weight:700}
.nav-icon{font-size:20px;line-height:1}
#main{padding:16px;padding-bottom:84px}
.card{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 12px rgba(26,107,138,.08);cursor:pointer;transition:transform .1s}
.card:active{transform:scale(.99)}
.card-nc{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 12px rgba(26,107,138,.08)}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px;white-space:nowrap;display:inline-block}
.badge-primary{background:#e8f4f8;color:#1a6b8a}
.badge-accent{background:#fef0e6;color:#e07b39}
.badge-success{background:#e6f5ee;color:#2a7d52}
.badge-warning{background:#fef3c7;color:#b45309}
.badge-danger{background:#fdecea;color:#c0392b}
.badge-gray{background:#eef1f3;color:#6b8899}
.btn{padding:10px 18px;font-size:14px;border:none;border-radius:12px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;gap:5px;transition:opacity .15s}
.btn:active{opacity:.85}
.btn-sm{padding:6px 11px;font-size:12px;border-radius:10px}
.btn-full{width:100%}
.btn-primary{background:#1a6b8a;color:#fff}
.btn-ghost{background:transparent;color:#1a6b8a;border:1.5px solid #1a6b8a}
.btn-wa{background:#25D366;color:#fff}
.btn-danger{background:#c0392b;color:#fff}
.btn-gray{background:#e6edf0;color:#3d5566}
.btn-success{background:#2a7d52;color:#fff}
.field{margin-bottom:12px}
.field-label{font-size:11px;font-weight:700;color:#6b8899;margin-bottom:4px;text-transform:uppercase;letter-spacing:.6px}
.finput{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid #d4e6ed;font-size:14px;font-family:inherit;color:#1c2b36;background:#fff;box-sizing:border-box;outline:none}
.finput:focus{border-color:#1a6b8a}
.field-note{font-size:11px;color:#6b8899;margin-top:3px}
.section{border-radius:14px;padding:12px 14px;margin-bottom:14px}
.section-title{font-size:11px;font-weight:800;letter-spacing:.8px;margin-bottom:10px}
.sec-vendor{background:#e8f4f8}.sec-vendor .section-title{color:#1a6b8a}
.sec-customer{background:#fef0e6}.sec-customer .section-title{color:#e07b39}
.sec-stock{background:#e6f5ee}.sec-stock .section-title{color:#2a7d52}
.pay-row{display:flex;justify-content:space-around;font-size:13px;background:#fff;border-radius:10px;padding:10px 12px;margin-bottom:10px;text-align:center}
.pay-row b{font-size:15px;display:block;margin-top:2px}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;overflow-y:auto;padding:12px 8px;display:none}
#modal{background:#fff;margin:0 auto;max-width:500px;border-radius:20px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.35)}
#modal-hdr{padding:15px 20px;background:#1a6b8a;color:#fff;display:flex;justify-content:space-between;align-items:center}
#modal-title{font-weight:800;font-size:16px}
#modal-sub{font-size:11px;opacity:.75;margin-top:2px}
#modal-close{background:none;border:none;color:#fff;font-size:28px;cursor:pointer;line-height:1;padding:0 4px;font-family:inherit}
#modal-body{padding:20px;max-height:82vh;overflow-y:auto}
.stat-grid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:16px;padding:14px 16px;flex:1 1 calc(50% - 6px);box-shadow:0 2px 10px rgba(26,107,138,.07)}
.stat-icon{font-size:26px;margin-bottom:4px}
.stat-val{font-size:20px;font-weight:800}
.stat-label{font-size:12px;font-weight:600;color:#1c2b36;margin-top:2px}
.stat-sub{font-size:11px;color:#6b8899;margin-top:1px}
.filters{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.filter-btn{padding:6px 14px;border-radius:20px;border:none;background:#fff;color:#6b8899;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:background .15s}
.filter-btn.active{background:#1a6b8a;color:#fff;box-shadow:none}
.search-box{width:100%;padding:10px 14px;border-radius:12px;border:1.5px solid #d4e6ed;font-size:14px;font-family:inherit;margin-bottom:12px;background:#fff;box-sizing:border-box;outline:none}
.search-box:focus{border-color:#1a6b8a}
.profit-chip{display:inline-flex;align-items:center;border-radius:10px;padding:6px 14px;margin-bottom:14px;font-weight:700;font-size:13px}
.profit-pos{background:#e6f5ee;color:#2a7d52}
.profit-neg{background:#fdecea;color:#c0392b}
.photo-full{width:100%;max-height:220px;object-fit:contain;border-radius:12px;margin-bottom:14px;background:#f0f0f0}
.photo-upload-area{border:2px dashed #d4e6ed;border-radius:12px;padding:14px;text-align:center;cursor:pointer;color:#6b8899;font-size:13px;transition:all .2s}
.photo-upload-area:hover{border-color:#1a6b8a;color:#1a6b8a;background:#e8f4f8}
.empty{text-align:center;padding:48px 20px;color:#6b8899}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-weight:600;font-size:15px;color:#3d5566}
.empty-sub{font-size:13px;margin-top:6px;line-height:1.5}
.row{display:flex;gap:8px}
.col{flex:1;min-width:0}
.row-sb{display:flex;justify-content:space-between;align-items:center}
.row-btn{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.title-lg{font-size:18px;font-weight:800;color:#1c2b36}
.title-sm{font-size:14px;font-weight:700;color:#1c2b36}
.text-sm{font-size:12px;color:#6b8899}
.text-xs{font-size:11px;color:#6b8899}
.text-danger{color:#c0392b}
.text-success{color:#2a7d52}
.fw600{font-weight:600}
.fw700{font-weight:700}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.outstanding{font-size:12px;font-weight:700;color:#c0392b;margin-top:4px}
.select-bar{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);width:calc(100% - 24px);max-width:476px;background:#1a6b8a;color:#fff;border-radius:14px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 20px rgba(26,107,138,.4);z-index:99}
.divider{height:1px;background:#eee;margin:12px 0}
input[type=file]{display:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="hdr-row">
      <div>
        <div class="hdr-name">🛍️ Sparsh Boutique by Nidhi</div>
        <div class="hdr-boutique">Orders &middot; Payments &middot; WhatsApp</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center"><button onclick="showSettings()" style="background:rgba(255,255,255,.15);border:none;border-radius:10px;padding:5px 10px;color:#fff;font-size:16px;cursor:pointer;font-family:inherit;position:relative" title="Backup &amp; Settings">⚙️<span id="hdr-backup-dot" style="position:absolute;top:3px;right:3px;width:8px;height:8px;border-radius:50%;background:#e07b39;border:1.5px solid rgba(255,255,255,.7)"></span></button><div class="hdr-badge" id="hdr-count">0 orders</div></div>
    </div>
  </div>
  <div id="main"></div>
  <div id="bnav">
    <button class="nav-btn active" id="nav-dashboard" onclick="switchTab('dashboard')"><span class="nav-icon">📊</span><span>Home</span></button>
    <button class="nav-btn" id="nav-orders" onclick="switchTab('orders')"><span class="nav-icon">📦</span><span>Orders</span></button>
    <button class="nav-btn" id="nav-vendors" onclick="switchTab('vendors')"><span class="nav-icon">🏪</span><span>Vendors</span></button>
    <button class="nav-btn" id="nav-customers" onclick="switchTab('customers')"><span class="nav-icon">👥</span><span>Customers</span></button>
  </div>
  <div id="overlay" onclick="overlayClick(event)">
    <div id="modal">
      <div id="modal-hdr">
        <div><div id="modal-title"></div><div id="modal-sub"></div></div>
        <button id="modal-close" onclick="closeModal()">&#215;</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>
  <input type="file" id="photo-input" accept="image/*" onchange="handlePhotoFile(this)">
  <input type="file" id="import-input" accept=".json" onchange="importData(this)">
</div>
<script>
const BOUTIQUE='Sparsh Boutique by Nidhi';
const DEFAULT_CATS=['Kurti','Jewellery','Bed Sheet','Home Decor','AGE Products','Other'];
const CLOTHING_CATS=['Kurti'];
const BED_CATS=['Bed Sheet'];
const CLOTHING_SIZES=['XS','S','M','L','XL','XXL','XXXL','Free Size','Custom'];
const BED_SIZES=['Single','Double','Queen','King','Custom'];
const PAY_MODES=['Credit','Advance','Partial','Paid'];

let vendors=[],customers=[],orders=[],categories=[];
let currentTab='dashboard',orderFilter='all',orderSearch='';
let selectMode=false,selectedOrders=new Set();

function loadData(){
  try{vendors=JSON.parse(localStorage.getItem('sb_vendors')||'[]');}catch(e){vendors=[];}
  try{customers=JSON.parse(localStorage.getItem('sb_customers')||'[]');}catch(e){customers=[];}
  try{orders=JSON.parse(localStorage.getItem('sb_orders')||'[]');}catch(e){orders=[];}
  try{categories=JSON.parse(localStorage.getItem('sb_categories')||JSON.stringify(DEFAULT_CATS));}catch(e){categories=[...DEFAULT_CATS];}
}
function _lsSet(key,val){
  try{localStorage.setItem(key,JSON.stringify(val));return true;}
  catch(e){
    if(e.name==='QuotaExceededError'||e.code===22||e.code===1014){
      showToast('⚠️ Storage full! Export a backup and remove old photos to free space.','danger',6000);
    } else {
      showToast('⚠️ Save failed: '+e.message,'danger',4000);
    }
    return false;
  }
}
function saveV(){if(_lsSet('sb_vendors',vendors))trackSave();}
function saveC(){if(_lsSet('sb_customers',customers))trackSave();}
function saveO(){if(_lsSet('sb_orders',orders))trackSave();}
function saveCats(){_lsSet('sb_categories',categories);}

/* ── Backup tracking ── */
function trackSave(){
  const n=parseInt(localStorage.getItem('sb_save_count')||'0')+1;
  localStorage.setItem('sb_save_count',n);
  const last=localStorage.getItem('sb_last_backup');
  const daysSince=last?Math.floor((Date.now()-parseInt(last))/(1000*60*60*24)):999;
  if(n%5===0||daysSince>=3){showBackupBanner();}
}
function showBackupBanner(){
  if(document.getElementById('backup-banner'))return;
  const b=document.createElement('div');
  b.id='backup-banner';
  b.style.cssText='position:fixed;bottom:70px;left:50%;transform:translateX(-50%);width:calc(100% - 24px);max-width:476px;background:#b45309;color:#fff;border-radius:14px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 20px rgba(0,0,0,.3);z-index:200;font-size:13px;font-weight:600;gap:10px';
  b.innerHTML=`<span>💾 Time to back up your data!</span><div style="display:flex;gap:6px"><button onclick="exportData();document.getElementById('backup-banner')?.remove()" style="background:rgba(255,255,255,.25);border:none;border-radius:8px;padding:5px 10px;color:#fff;font-size:12px;font-weight:700;cursor:pointer">Backup Now</button><button onclick="document.getElementById('backup-banner')?.remove()" style="background:none;border:none;color:rgba(255,255,255,.7);font-size:18px;cursor:pointer;padding:0 2px">&times;</button></div>`;
  document.body.appendChild(b);
  setTimeout(()=>b.remove(),30000);
}
function showToast(msg,type,duration){
  const existing=document.getElementById('sb-toast');if(existing)existing.remove();
  const t=document.createElement('div');
  t.id='sb-toast';
  const bg=type==='danger'?'#c0392b':type==='success'?'#2a7d52':'#1a6b8a';
  t.style.cssText=`position:fixed;top:72px;left:50%;transform:translateX(-50%);background:${bg};color:#fff;border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;z-index:300;box-shadow:0 4px 16px rgba(0,0,0,.25);max-width:90%;text-align:center;transition:opacity .3s`;
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},(duration||2500)-300);
}
function updateBackupStatus(){
  const last=localStorage.getItem('sb_last_backup');
  const el=document.getElementById('hdr-backup-dot');
  if(!el)return;
  if(!last){el.style.background='#e07b39';el.title='No backup yet!';}
  else{
    const days=Math.floor((Date.now()-parseInt(last))/(1000*60*60*24));
    if(days===0){el.style.background='#2a7d52';el.title='Backed up today';}
    else if(days<=3){el.style.background='#b45309';el.title='Last backup '+days+'d ago';}
    else{el.style.background='#c0392b';el.title='No backup in '+days+' days!';}
  }
}

const fmt=n=>'&#8377;'+Number(n||0).toLocaleString('en-IN');
const fmtPlain=n=>'\u20B9'+Number(n||0).toLocaleString('en-IN');
const toStr=()=>new Date().toISOString().split('T')[0];
const newId=()=>'ORD-'+Date.now().toString().slice(-6);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const getV=id=>vendors.find(v=>v.id===id);
const getC=id=>customers.find(c=>c.id===id);
const getO=id=>orders.find(o=>o.id===id);
const badge=(t,c)=>`<span class="badge badge-${c||'gray'}">${esc(t)}</span>`;
const custDue=cid=>orders.filter(o=>o.customerId===cid).reduce((s,o)=>s+Math.max(0,(o.customerPrice||0)-(o.customerAmountPaid||0)),0);
const vendDue=vid=>orders.filter(o=>o.vendorId===vid).reduce((s,o)=>s+Math.max(0,(o.vendorPrice||0)-(o.vendorAmountPaid||0)),0);
const getSizeOpts=cat=>CLOTHING_CATS.includes(cat)?CLOTHING_SIZES:BED_CATS.includes(cat)?BED_SIZES:null;

function switchTab(tab){
  currentTab=tab;selectMode=false;selectedOrders.clear();
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nav-'+tab);
  if(nb)nb.classList.add('active');
  document.getElementById('hdr-count').textContent=orders.length+' orders';
  renderMain();
}
function renderMain(){
  const m=document.getElementById('main');
  if(currentTab==='dashboard')m.innerHTML=renderDashboard();
  else if(currentTab==='orders')m.innerHTML=renderOrders();
  else if(currentTab==='vendors')m.innerHTML=renderVendors();
  else if(currentTab==='customers')m.innerHTML=renderCustomers();
}

function renderDashboard(){
  const pendDel=orders.filter(o=>o.type==='customer_order'&&o.deliveryStatus!=='delivered');
  const awaitRec=orders.filter(o=>o.vendorOrderStatus!=='received');
  const inStock=orders.filter(o=>o.type==='stock_order'&&o.stockStatus==='in_stock');
  const toRecv=orders.filter(o=>o.type==='customer_order'||(o.type==='stock_order'&&o.stockStatus==='sold')).reduce((s,o)=>s+Math.max(0,(o.customerPrice||0)-(o.customerAmountPaid||0)),0);
  const toPay=orders.reduce((s,o)=>s+Math.max(0,(o.vendorPrice||0)-(o.vendorAmountPaid||0)),0);
  const sc=(icon,label,val,sub,vc)=>`<div class="stat-card"><div class="stat-icon">${icon}</div><div class="stat-val" style="color:${vc||'#1a6b8a'}">${val}</div><div class="stat-label">${label}</div>${sub?`<div class="stat-sub">${sub}</div>`:''}</div>`;
  let pdHtml='';
  if(pendDel.length>0){
    pdHtml=`<div class="title-sm" style="margin-bottom:8px">🚚 Pending Deliveries</div>`;
    pendDel.slice(0,4).forEach(o=>{
      const c=getC(o.customerId);const ready=o.vendorOrderStatus==='received';
      pdHtml+=`<div class="card" onclick="showOrderDetail('${o.id}')"><div class="row-sb"><div><div class="fw700" style="font-size:14px">${esc(o.productName)}</div><div class="text-xs">${esc(c?.name||'—')}&nbsp;&middot;&nbsp;${o.id}</div></div>${badge(ready?'📦 Ready':'⏳ Awaiting',ready?'success':'warning')}</div></div>`;
    });
    if(pendDel.length>4)pdHtml+=`<div class="text-xs" style="text-align:center;margin-bottom:10px">+${pendDel.length-4} more &mdash; see Orders tab</div>`;
  }
  let stHtml='';
  if(inStock.length>0){
    stHtml=`<div class="title-sm" style="margin-bottom:8px;margin-top:6px">📦 Your Stock Items</div>`;
    inStock.slice(0,3).forEach(o=>{const v=getV(o.vendorId);stHtml+=`<div class="card" onclick="showOrderDetail('${o.id}')"><div class="row-sb"><div><div class="fw700" style="font-size:14px">${esc(o.productName)}</div><div class="text-xs">${esc(o.category)}&nbsp;&middot;&nbsp;${esc(v?.name||'—')}</div></div>${badge(fmt(o.vendorPrice),'primary')}</div></div>`;});
  }
  const empty=orders.length===0?`<div class="empty"><div class="empty-icon">🛍️</div><div class="empty-title">No orders yet</div><div class="empty-sub">Start by adding vendors &amp; customers,<br>then create your first order!</div></div>`:'';
  return `<div style="margin-bottom:16px"><div style="font-size:22px;font-weight:800;color:#1c2b36">Hello, Nidhi! 👋</div><div class="text-sm" style="margin-top:2px">${orders.length} orders&nbsp;&middot;&nbsp;${vendors.length} vendors&nbsp;&middot;&nbsp;${customers.length} customers</div></div><div class="stat-grid">${sc('🚚','Pending Deliveries',pendDel.length,'',pendDel.length>0?'#b45309':'#2a7d52')}${sc('📬','Awaiting from Vendor',awaitRec.length,'',awaitRec.length>0?'#1a6b8a':'#2a7d52')}${sc('💰','To Collect',fmt(toRecv),'From customers',toRecv>0?'#2a7d52':'#6b8899')}${sc('💸','To Pay',fmt(toPay),'To vendors',toPay>0?'#c0392b':'#6b8899')}${sc('📦','In Stock',inStock.length,'Unsold items','#1a6b8a')}</div>${pdHtml}${stHtml}${empty}`;
}

function renderOrders(){
  let filtered=orders.filter(o=>{
    if(orderFilter==='undelivered')return o.type==='customer_order'&&o.deliveryStatus!=='delivered';
    if(orderFilter==='awaiting')return o.vendorOrderStatus!=='received';
    if(orderFilter==='stock')return o.type==='stock_order'&&o.stockStatus==='in_stock';
    if(orderFilter==='dues')return Math.max(0,(o.customerPrice||0)-(o.customerAmountPaid||0))>0;
    return true;
  }).filter(o=>!orderSearch||o.productName.toLowerCase().includes(orderSearch.toLowerCase())||o.id.toLowerCase().includes(orderSearch.toLowerCase()));
  const filt=[['all','All'],['undelivered','🚚 Undelivered'],['awaiting','📬 Awaiting'],['stock','📦 Stock'],['dues','💰 Dues']];
  let cards='';
  if(filtered.length===0)cards=`<div class="empty"><div class="empty-title">No orders match</div></div>`;
  else filtered.forEach(o=>{
    const v=getV(o.vendorId),c=getC(o.customerId);
    const profit=(o.customerPrice||0)-(o.vendorPrice||0);
    const cDue=Math.max(0,(o.customerPrice||0)-(o.customerAmountPaid||0));
    const chk=selectMode?`<input type="checkbox" style="width:18px;height:18px;margin-right:8px;accent-color:#1a6b8a;flex-shrink:0" ${selectedOrders.has(o.id)?'checked':''} onclick="toggleSel('${o.id}',event)">`:'';
    const ph=o.photo?`<img src="${o.photo}" style="width:46px;height:46px;border-radius:10px;object-fit:cover;flex-shrink:0">`:'';

function onStockChange(){

  if(document.getElementById('stock-sold'))document.getElementById('stock-sold').style.display=s==='sold'?'block':'none';
}
function onSizeChange(){
  const v=document.getElementById('of-size')?.value;

  if(cw)cw.style.display=v==='Custom'?'block':'none';

function onCatChange(){
  const cat=document.getElementById('of-cat')?.value;
  if(cat==='__new__'){
    const name=prompt('Enter new category name:');
    if(name&&name.trim()){
      const n=name.trim();
      if(!categories.includes(n)){categories.push(n);saveCats();}
      const sel=document.getElementById('of-cat');
      const opt=document.createElement('option');
      opt.value=n;opt.textContent=n;opt.selected=true;
      sel.insertBefore(opt,sel.lastElementChild);
      sel.value=n;
    } else {
      const sel=document.getElementById('of-cat');
      if(sel)sel.value=categories[0]||'';
    }
    return;
  }
  const sec=document.getElementById('size-section');
  if(sec)sec.innerHTML=buildSizeHtml(cat,'');
}
function getFormSize(){
  const se=document.getElementById('of-size');
  if(se){const v=se.value;if(v==='Custom'){const cs=document.getElementById('of-custom-size');return cs?cs.value.trim():'';}return v;}
  const fe=document.getElementById('of-size-free');
  return fe?fe.value.trim():'';
}

function saveOrder(){

  const name=document.getElementById('of-name')?.value?.trim();
  const type=document.getElementById('of-type')?.value;
  const vendorId=document.getElementById('of-vendor')?.value;
  if(!name){alert('Product name is required.');return;}
  if(!vendorId){alert('Please select a vendor.');return;}
  if(type==='customer_order'&&!document.getElementById('of-cust')?.value){alert('Please select a customer.');return;}
  const isSold=document.getElementById('of-sstatus')?.value==='sold';
  const customerId=type==='customer_order'?document.getElementById('of-cust')?.value:(isSold?(document.getElementById('of-scust')?.value||''):'');
  const customerPrice=type==='customer_order'?parseFloat(document.getElementById('of-cprice')?.value||0):(isSold?parseFloat(document.getElementById('of-scprice')?.value||0):0);
  const customerAmountPaid=type==='customer_order'?parseFloat(document.getElementById('of-cpaid')?.value||0):(isSold?parseFloat(document.getElementById('of-scpaid')?.value||0):0);
  const customerPaymentMode=type==='customer_order'?(document.getElementById('of-cpm')?.value||'Credit'):(isSold?(document.getElementById('of-scpm')?.value||'Credit'):'Credit');
  const updated={id,type,productName:name,category:document.getElementById('of-cat')?.value||categories[0],quantity:parseInt(document.getElementById('of-qty')?.value||1),size:getFormSize(),description:'',vendorId,customerId:customerId||'',vendorPrice:parseFloat(document.getElementById('of-vprice')?.value||0),vendorAmountPaid:parseFloat(document.getElementById('of-vpaid')?.value||0),vendorPaymentMode:document.getElementById('of-vpm')?.value||'Credit',vendorOrderStatus:document.getElementById('of-vstatus')?.value||'ordered',customerPrice,customerAmountPaid,customerPaymentMode,deliveryStatus:type==='customer_order'?(document.getElementById('of-dstatus')?.value||'pending'):'pending',stockStatus:type==='stock_order'?(document.getElementById('of-sstatus')?.value||'in_stock'):'in_stock',orderDate:document.getElementById('of-date')?.value||toStr(),notes:document.getElementById('of-notes')?.value||'',photo:document.getElementById('of-photo')?.value||''};
  const idx=orders.findIndex(o=>o.id===id);
  if(idx>=0)orders[idx]=updated;else orders.unshift(updated);
  saveO();closeModal();renderMain();
  document.getElementById('hdr-count').textContent=orders.length+' orders';
}

function handlePhotoFile(input){
  const file=input.files[0];if(!file)return;input.value='';
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const MAX=600;let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const data=canvas.toDataURL('image/jpeg',0.75);
      const pf=document.getElementById('of-photo');if(pf)pf.value=data;
      const pa=document.getElementById('photo-area');
      if(pa){
        const parent=pa.parentElement;
        parent.innerHTML=`<div class="field-label">Product Photo</div><div style="margin-bottom:8px"><img src="${data}" style="width:80px;height:80px;border-radius:10px;object-fit:cover"><br><button type="button" class="btn btn-sm btn-danger" style="margin-top:6px" onclick="clearPhoto()">🗑️ Remove</button></div><div class="photo-upload-area" id="photo-area" onclick="document.getElementById('photo-input').click()">📷 Change photo</div>`;
        const pf2=document.getElementById('of-photo');if(pf2)pf2.value=data;
        else{const h2=document.createElement('input');h2.type='hidden';h2.id='of-photo';h2.value=data;parent.appendChild(h2);}
      }
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function renderVendors(){
  let h=`<div class="sec-hdr"><div class="title-lg">Vendors <span style="font-size:14px;color:#6b8899;font-weight:400">(${vendors.length})</span></div><button class="btn btn-sm btn-primary" onclick="showAddVendor()">+ Add Vendor</button></div>`;
  if(vendors.length===0)return h+`<div class="empty"><div class="empty-icon">🏪</div><div class="empty-title">No vendors yet</div><div class="empty-sub">Add your vendors to start creating orders</div></div>`;

function getStorageUsed(){
  let total=0;
  ['sb_vendors','sb_customers','sb_orders','sb_categories'].forEach(k=>{
    const v=localStorage.getItem(k);
    if(v)total+=v.length;
  });
  if(total<1024)return total+' bytes';
  if(total<1048576)return (total/1024).toFixed(1)+' KB';
  return (total/1048576).toFixed(2)+' MB';
}

function exportData(){
  const data={
    version:1,
    exportedAt:new Date().toISOString(),
    boutique:'Sparsh Boutique by Nidhi',
    vendors,customers,orders,categories
  };
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const dt=new Date().toISOString().split('T')[0];
  a.href=url;
  a.download=`SparshBoutique_Backup_${dt}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  localStorage.setItem('sb_last_backup', Date.now().toString());
  localStorage.setItem('sb_save_count','0');
  updateBackupStatus();
  document.getElementById('backup-banner')?.remove();
  alert('✅ Backup downloaded!\n\nSave this file to Google Drive or WhatsApp it to yourself for safekeeping. Your backup status has been updated.');
}

function importData(input){
  const file=input.files[0];
  if(!file)return;
  input.value='';
  if(!file.name.endsWith('.json')){alert('Please select a valid .json backup file.');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.version||!Array.isArray(data.orders)){
        alert('Invalid backup file. Please select a file exported from this app.');return;
      }
      if(!confirm(`Restore backup from ${data.exportedAt?new Date(data.exportedAt).toLocaleString():'unknown date'}?\n\nThis will replace ALL current data.\n\nOrders: ${data.orders.length}\nVendors: ${data.vendors.length}\nCustomers: ${data.customers.length}\n\nAre you sure?`))return;
      vendors=data.vendors||[];
      customers=data.customers||[];
      orders=data.orders||[];
      categories=data.categories||DEFAULT_CATS;
      saveV();saveC();saveO();saveCats();
      closeModal();
      renderMain();
      document.getElementById('hdr-count').textContent=orders.length+' orders';
      alert('✅ Data restored successfully!\n\n'+orders.length+' orders, '+vendors.length+' vendors, '+customers.length+' customers loaded.');
    }catch(err){
      alert('Failed to read backup file. Please make sure it is a valid backup.');
    }
  };
  reader.readAsText(file);
}

loadData();
switchTab('dashboard');
// Startup confirmation toast
setTimeout(()=>{
  if(orders.length>0||vendors.length>0||customers.length>0){
    showToast('✅ Loaded: '+orders.length+' orders, '+vendors.length+' vendors, '+customers.length+' customers','success',3500);
  }
  updateBackupStatus();
},400);
// Backup nudge on page exit if no recent backup
window.addEventListener('beforeunload',()=>{
  const last=localStorage.getItem('sb_last_backup');
  const days=last?Math.floor((Date.now()-parseInt(last))/(1000*60*60*24)):999;
  if(days>=3&&(orders.length>0||vendors.length>0)){
    return 'You have unsaved backup. Export a backup from Settings before closing!';
  }
});
</script>
</body>
</html>
