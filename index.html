<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sparsh BizTrack">
<title>Sparsh BizTrack v4</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:#f0f7fa;overflow-x:hidden}
#app{max-width:500px;margin:0 auto;min-height:100vh}
/* Header */
#hdr{background:linear-gradient(135deg,#134f66,#1a6b8a);padding:12px 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(26,107,138,.25)}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr-name{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.2px}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.7);margin-top:1px;font-weight:600;letter-spacing:.4px;text-transform:uppercase}
.hdr-right{display:flex;gap:8px;align-items:center}
.icon-btn{background:rgba(255,255,255,.15);border:none;border-radius:10px;padding:5px 10px;color:#fff;font-size:16px;cursor:pointer;position:relative;line-height:1}
.backup-dot{position:absolute;top:2px;right:2px;width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(255,255,255,.6)}
.sync-row{display:flex;align-items:center;gap:4px;font-size:10px;color:rgba(255,255,255,.75)}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.sd-green{background:#4ade80}.sd-orange{background:#fb923c}.sd-red{background:#f87171}
/* Bottom Nav */
#bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;display:flex;background:#fff;border-top:1px solid #d4e6ed;box-shadow:0 -4px 20px rgba(26,107,138,.1);z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 2px 7px;background:none;border:none;cursor:pointer;font-family:inherit;color:#6b8899;border-top:2.5px solid transparent;font-size:9px;font-weight:500;gap:2px;line-height:1.2}
.nav-btn.active{color:#1a6b8a;border-top-color:#1a6b8a;font-weight:700}
.nav-icon{font-size:18px;line-height:1}
/* Main */
#main{padding:14px;padding-bottom:84px}
/* Cards */
.card{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 12px rgba(26,107,138,.08);cursor:pointer}
.card:active{opacity:.88;transform:scale(.99)}
.card-nc{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 12px rgba(26,107,138,.08)}
/* Badges */
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;white-space:nowrap}
.b-primary{background:#e8f4f8;color:#1a6b8a}
.b-accent{background:#fef0e6;color:#e07b39}
.b-success{background:#e6f5ee;color:#2a7d52}
.b-warning{background:#fef3c7;color:#b45309}
.b-danger{background:#fdecea;color:#c0392b}
.b-gray{background:#eef1f3;color:#6b8899}
.b-purple{background:#f0ebff;color:#7c3aed}
/* Buttons */
.btn{padding:10px 18px;font-size:14px;border:none;border-radius:12px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;gap:5px;line-height:1}
.btn:active{opacity:.8}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:10px}
.btn-full{width:100%}
.btn-p{background:#1a6b8a;color:#fff}
.btn-ghost{background:transparent;color:#1a6b8a;border:1.5px solid #1a6b8a}
.btn-wa{background:#25D366;color:#fff}
.btn-danger{background:#c0392b;color:#fff}
.btn-gray{background:#e6edf0;color:#3d5566}
.btn-success{background:#2a7d52;color:#fff}
.btn-archive{background:#7c3aed;color:#fff}
/* Form */
.field{margin-bottom:12px}
.fl{font-size:11px;font-weight:700;color:#6b8899;margin-bottom:4px;text-transform:uppercase;letter-spacing:.6px;display:block}
.fi{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid #d4e6ed;font-size:14px;font-family:inherit;color:#1c2b36;background:#fff;outline:none;-webkit-appearance:none}
.fi:focus{border-color:#1a6b8a}
.fi-note{font-size:11px;color:#6b8899;margin-top:3px}
/* Sections */
.sec{border-radius:14px;padding:12px 14px;margin-bottom:14px}
.sec-t{font-size:11px;font-weight:800;letter-spacing:.8px;margin-bottom:10px;text-transform:uppercase}
.sv{background:#e8f4f8}.sv .sec-t{color:#1a6b8a}
.sc{background:#fef0e6}.sc .sec-t{color:#e07b39}
.ss{background:#e6f5ee}.ss .sec-t{color:#2a7d52}
/* Pay row */
.pay-row{display:flex;justify-content:space-around;font-size:12px;background:#fff;border-radius:10px;padding:10px 8px;margin-bottom:10px;text-align:center}
.pay-row b{font-size:14px;display:block;margin-top:2px}
/* Modal */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;overflow-y:auto;padding:12px 8px;display:none}
#modal{background:#fff;margin:0 auto;max-width:500px;border-radius:20px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.35)}
.mhdr{padding:14px 20px;background:#1a6b8a;color:#fff;display:flex;justify-content:space-between;align-items:flex-start}
.mt{font-weight:800;font-size:16px}.ms{font-size:11px;opacity:.75;margin-top:2px}
.mc{background:none;border:none;color:#fff;font-size:28px;cursor:pointer;line-height:1;padding:0 4px;flex-shrink:0}
#modal-body{padding:20px;max-height:80vh;overflow-y:auto}
/* Filters */
.filter-bar{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;margin-bottom:10px}
.filter-bar::-webkit-scrollbar{display:none}
.fb{padding:6px 14px;border-radius:20px;border:none;background:#fff;color:#6b8899;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.08);font-family:inherit}
.fb.act{background:#1a6b8a;color:#fff}
.search-box{width:100%;padding:10px 14px;border-radius:12px;border:1.5px solid #d4e6ed;font-size:14px;font-family:inherit;margin-bottom:12px;background:#fff;outline:none}
.search-box:focus{border-color:#1a6b8a}
/* Dashboard */
.out-block{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 12px rgba(26,107,138,.08)}
.obt{font-size:12px;font-weight:800;color:#6b8899;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.or{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f5f5f5;cursor:pointer}
.or:last-child{border-bottom:none;padding-bottom:0}
.or:active{opacity:.75}
.on{font-size:14px;font-weight:600;color:#1c2b36}
.od{font-size:11px;color:#6b8899;margin-top:1px}
.oa{font-size:15px;font-weight:800}
.recv{color:#e07b39}.pay{color:#c0392b}
/* Financials */
.period-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.pb{padding:5px 12px;border-radius:20px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#6b8899;box-shadow:0 1px 4px rgba(0,0,0,.08);font-family:inherit}
.pb.act{background:#1a6b8a;color:#fff}
.fin-block{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 12px rgba(26,107,138,.08)}
.fin-t{font-size:12px;font-weight:800;color:#6b8899;text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
.fin-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.fin-row:last-child{border-bottom:none}
.fin-label{color:#3d5566}.fin-val{font-weight:700;color:#1c2b36}
.fin-div{height:1px;background:#e8e8e8;margin:8px 0}
.fin-profit{display:flex;justify-content:space-between;padding:8px 0;font-size:15px;font-weight:800}
.mode-box{display:flex;gap:8px;padding:4px 0}
.mb{flex:1;border-radius:10px;padding:8px 10px;text-align:center}
.mb-lbl{font-size:10px;color:#6b8899;font-weight:600;text-transform:uppercase}
.mb-val{font-size:14px;font-weight:800;margin-top:2px}
/* Misc layout */
.row{display:flex;gap:8px}.col{flex:1;min-width:0}
.rsb{display:flex;justify-content:space-between;align-items:center}
.row-btn{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.title-lg{font-size:18px;font-weight:800;color:#1c2b36}
.title-sm{font-size:14px;font-weight:700;color:#1c2b36}
.t-sm{font-size:12px;color:#6b8899}.t-xs{font-size:11px;color:#6b8899}
.t-danger{color:#c0392b}.t-success{color:#2a7d52}
.fw7{font-weight:700}.fw8{font-weight:800}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.divider{height:1px;background:#eee;margin:12px 0}
.empty{text-align:center;padding:40px 20px}
.ei{font-size:38px;margin-bottom:10px}
.et{font-weight:700;font-size:15px;color:#3d5566}
.es{font-size:13px;color:#6b8899;margin-top:6px;line-height:1.5}
.photo-area{border:2px dashed #d4e6ed;border-radius:12px;padding:14px;text-align:center;cursor:pointer;color:#6b8899;font-size:13px}
.photo-area:hover{border-color:#1a6b8a;background:#e8f4f8}
input[type=file]{display:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}
/* People tabs */
.ptabs{display:flex;background:#e8f4f8;border-radius:12px;padding:4px;margin-bottom:14px;gap:4px}
.ptab{flex:1;padding:8px;border:none;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;color:#6b8899;background:transparent;transition:all .15s}
.ptab.act{background:#fff;color:#1a6b8a;box-shadow:0 1px 4px rgba(0,0,0,.1)}
/* Status change sheet */
.stat-opt{display:flex;align-items:center;gap:10px;padding:13px 16px;border-radius:12px;margin-bottom:8px;cursor:pointer;font-size:14px;font-weight:700;color:#fff;border:none;font-family:inherit;width:100%}
.stat-opt:active{opacity:.85}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="hdr-row">
      <div>
        <div class="hdr-name">🛍️ Sparsh Boutique</div>
        <div class="hdr-sub">by Nidhi</div>
      </div>
      <div class="hdr-right">
        <div class="sync-row"><span class="sync-dot sd-orange" id="sync-dot"></span><span id="sync-txt" style="font-size:10px">Local</span></div>
        <button class="icon-btn" onclick="switchTab('more')" title="Settings & Backup">⚙️<span class="backup-dot" id="backup-dot" style="background:#fb923c"></span></button>
        <div style="background:rgba(255,255,255,.15);border-radius:10px;padding:5px 10px;font-size:12px;color:#fff;font-weight:700" id="hdr-count">0 orders</div>
      </div>
    </div>
  </div>

  <div id="main"></div>

  <div id="bnav">
    <button class="nav-btn active" id="nav-home" onclick="switchTab('home')"><span class="nav-icon">🏠</span>Home</button>
    <button class="nav-btn" id="nav-orders" onclick="switchTab('orders')"><span class="nav-icon">📦</span>Orders</button>
    <button class="nav-btn" id="nav-reports" onclick="switchTab('reports')"><span class="nav-icon">📊</span>Reports</button>
    <button class="nav-btn" id="nav-people" onclick="switchTab('people')"><span class="nav-icon">👥</span>People</button>
    <button class="nav-btn" id="nav-more" onclick="switchTab('more')"><span class="nav-icon">☰</span>More</button>
  </div>

  <div id="overlay" onclick="overlayClick(event)">
    <div id="modal">
      <div class="mhdr">
        <div><div class="mt" id="modal-title"></div><div class="ms" id="modal-sub"></div></div>
        <button class="mc" onclick="closeModal()">&#215;</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <input type="file" id="photo-input" accept="image/*" onchange="handlePhoto(this)">
  <input type="file" id="import-input" accept=".json" onchange="importData(this)">
  <input type="file" id="import-people-input" accept=".json" onchange="importPeopleData(this)">
</div>

<script>
/* ══════════════════════════════════════════════════════
   🔥 FIREBASE CONFIG
   Step 1: Go to https://console.firebase.google.com
   Step 2: Create project "SparshBoutique"
   Step 3: Add Web App → copy config values below
   Step 4: In Firestore → Create database → test mode
   Leave empty ("") to use LOCAL STORAGE ONLY mode
══════════════════════════════════════════════════════ */
const FB_CFG = {
  apiKey: "",
  authDomain: "",
  projectId: "",
  storageBucket: "",
  messagingSenderId: "",
  appId: ""
};
/* ══════════════════════════════════════════════════════ */

/* ─── Constants ─── */
const BOUTIQUE = 'Sparsh Boutique by Nidhi';
const APP_VER = 3;
const DEF_CATS = ['Kurti','Kurti Pant','Saree','Suit','Gown','Jewellery','Bed Sheet','Home Decor','AGE Products','Other'];
const CLOTHING = ['Kurti','Kurti Pant','Suit','Gown','Saree'];
const BED_CAT  = ['Bed Sheet'];
const CLO_SZ   = ['XS','S','M','L','XL','XXL','XXXL','Free Size','Custom'];
const BED_SZ   = ['Single','Double','Queen','King','Custom'];
const VEND_PAY_MODES = ['Cash','UPI','Card'];
const CUST_PAY_MODES = ['Cash','UPI'];
const STATUSES = [
  {k:'ordered',   l:'📋 Ordered',    b:'b-primary', bg:'#1a6b8a'},
  {k:'ready',     l:'📦 Ready',      b:'b-warning', bg:'#b45309'},
  {k:'delivered', l:'✅ Delivered',  b:'b-success', bg:'#2a7d52'},
  {k:'cancelled', l:'❌ Cancelled',  b:'b-danger',  bg:'#c0392b'}
];
const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

/* ─── State ─── */
let vendors=[], customers=[], orders=[], categories=[], settings={};
let currentTab='home', oFilter='all', oSearch='', oMonth='', oCustF='', oVendF='';
let peopleTab='customers', dashPeriod='this_month', dashCustMon='';
let db=null, useFirebase=false;

/* ─── Firebase ─── */
function initFirebase() {
  if (!FB_CFG.apiKey) return;
  try {
    firebase.initializeApp(FB_CFG);
    db = firebase.firestore();
    db.enablePersistence({synchronizeTabs:false}).catch(e=>console.log('Persist:',e.code));
    useFirebase = true;
    setSyncStatus('connecting');
    startListeners();
  } catch(e) { console.error('Firebase init:', e); setSyncStatus('local'); }
}

function startListeners() {
  const snap = (col, setter) => db.collection(col).onSnapshot(
    s => { setter(s.docs.map(d=>({id:d.id,...d.data()}))); lsSet('sb_'+col, window['_raw_'+col]); refreshUI(); setSyncStatus('online'); },
    e => { console.log(col+' err:', e); setSyncStatus('offline'); }
  );
  db.collection('orders').onSnapshot(s => {
    orders = s.docs.map(d => migrate({id:d.id,...d.data()}));
    lsSet('sb_orders', orders); refreshUI(); setSyncStatus('online');
  }, e => { setSyncStatus('offline'); });
  snap('vendors',  v => vendors   = v);
  snap('customers',c => customers = c);
  db.collection('settings').doc('config').onSnapshot(s => {
    if (s.exists) { const d=s.data(); categories=d.categories||DEF_CATS; settings={...d}; lsSet('sb_cats',categories); }
  }, e=>{});
}

function setSyncStatus(state) {
  const dot=document.getElementById('sync-dot'), txt=document.getElementById('sync-txt');
  if (!dot) return;
  const map={online:['sd-green','☁️ Synced'],offline:['sd-orange','Offline'],connecting:['sd-orange','Syncing…'],local:['sd-orange','Local']};
  const [cls,label]=map[state]||map.local;
  dot.className='sync-dot '+cls; if(txt)txt.textContent=label;
}

/* ─── Local Storage ─── */
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true;}catch(e){if(e.name==='QuotaExceededError')toast('⚠️ Storage almost full! Export backup now.','danger',5000);return false;}}
function lsGet(k,d){try{return JSON.parse(localStorage.getItem(k)||'null')??d;}catch(e){return d;}}

function loadLocal() {
  vendors  = lsGet('sb_vendors',  []);
  customers= lsGet('sb_customers',[]);
  orders   = lsGet('sb_orders',   []).map(migrate);
  categories=lsGet('sb_cats',     DEF_CATS);
  settings = lsGet('sb_settings', {});
  lsSet('sb_orders',orders);
}

function loadData() {
  loadLocal();       // show cached data instantly
  initFirebase();    // Firebase syncs and overrides
  if (!useFirebase) refreshUI();
}

/* ─── Migration V1→V2/V3 ─── */
function migrate(o) {
  if (!o) return o;
  // Map old in_progress key to new ordered key
  if (o.status === 'in_progress') o = {...o, status:'ordered'};
  if ((o.version||1) >= 2) return o;
  let status = 'ordered';
  if (o.deliveryStatus==='delivered') status='delivered';
  else if (o.vendorOrderStatus==='received') status='ready';
  const fixPM = m => (m==='Advance'||m==='Partial'||m==='Credit'||m==='Paid'?'Cash':m||'Cash');
  return {
    ...o, version:2, status,
    isArchived:    o.isArchived||false,
    archivedAt:    o.archivedAt||null,
    vendorPaymentMode:   fixPM(o.vendorPaymentMode),
    customerPaymentMode: fixPM(o.customerPaymentMode),
    expenses:      o.expenses||[],
    vendorPayments:o.vendorPayments||[],
    customerPayments:o.customerPayments||[]
  };
}

/* ─── Firebase Write ─── */
async function fbSet(col, id, data) {
  if (!db) return;
  try { const {id:_,...d}=data; await db.collection(col).doc(id).set(d,{merge:true}); }
  catch(e){ console.error('fbSet:',e); }
}
async function fbDel(col, id) {
  if (!db) return;
  try { await db.collection(col).doc(id).delete(); } catch(e){}
}

/* ─── Data Saves ─── */
function saveOrder(o) {
  const i=orders.findIndex(x=>x.id===o.id);
  if(i>=0)orders[i]=o; else orders.unshift(o);
  lsSet('sb_orders',orders); trackSave();
  fbSet('orders',o.id,o);
}
function deleteOrder(id) {
  orders=orders.filter(o=>o.id!==id);
  lsSet('sb_orders',orders); fbDel('orders',id); refreshUI();
}
function saveVendors()  { lsSet('sb_vendors',vendors);   vendors.forEach(v=>fbSet('vendors',v.id,v)); }
function saveCustomers(){ lsSet('sb_customers',customers);customers.forEach(c=>fbSet('customers',c.id,c)); }
function saveSettings() { lsSet('sb_cats',categories); lsSet('sb_settings',settings); fbSet('settings','config',{categories,...settings}); }
function saveAllToFb()  { orders.forEach(o=>fbSet('orders',o.id,o)); saveVendors(); saveCustomers(); saveSettings(); }

/* ─── Utils ─── */
const Rs  = n => '₹'+Number(n||0).toLocaleString('en-IN');
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const today = () => new Date().toISOString().split('T')[0];
const uid   = p  => p+'-'+Date.now().toString().slice(-7)+Math.random().toString(36).slice(2,5);
const getV  = id => vendors.find(v=>v.id===id);
const getC  = id => customers.find(c=>c.id===id);
const getO  = id => orders.find(o=>o.id===id);
const badge = (t,c)=>`<span class="badge ${c||'b-gray'}">${esc(t)}</span>`;
const sum   = (arr,fn) => arr.reduce((s,x)=>s+(typeof fn==='function'?fn(x):(+x[fn]||0)),0);

function vPaid(o){ return o.vendorPayments?.length   ? sum(o.vendorPayments,'amount')   : (o.vendorAmountPaid||0); }
function cPaid(o){ return o.customerPayments?.length ? sum(o.customerPayments,'amount') : (o.customerAmountPaid||0); }
function vBal(o) { return Math.max(0,(o.vendorPrice||0)-vPaid(o)); }
function cBal(o) { return Math.max(0,(o.customerPrice||0)-cPaid(o)); }
function grossP(o){ return (o.customerPrice||0)-(o.vendorPrice||0); }
function netP(o)  { return grossP(o)-sum(o.expenses||[],'amount'); }
function stInfo(o){ return STATUSES.find(s=>s.k===(o.status||'ordered'))||STATUSES[0]; }

/* ─── Backup Tracking ─── */
function trackSave() {
  const n=(lsGet('sb_saves',0))+1; lsSet('sb_saves',n);
  const last=localStorage.getItem('sb_last_bk');
  const days=last?Math.floor((Date.now()-parseInt(last))/86400000):999;
  if (!useFirebase && (n%10===0||days>=3)) showBkBanner();
  updateBkDot();
}
function updateBkDot(){
  const dot=document.getElementById('backup-dot'); if(!dot)return;
  if(useFirebase){dot.style.background='#4ade80';return;}
  const last=localStorage.getItem('sb_last_bk');
  if(!last){dot.style.background='#fb923c';return;}
  const days=Math.floor((Date.now()-parseInt(last))/86400000);
  dot.style.background=days===0?'#4ade80':days<=3?'#b45309':'#c0392b';
}
function showBkBanner() {
  if(document.getElementById('bk-banner'))return;
  const b=document.createElement('div'); b.id='bk-banner';

/* ─── Toast ─── */
function toast(msg,type,dur){
  document.getElementById('_toast')?.remove();
  const t=document.createElement('div'); t.id='_toast';
  const bg=type==='danger'?'#c0392b':type==='success'?'#2a7d52':type==='info'?'#7c3aed':'#1a6b8a';
  t.style.cssText=`position:fixed;top:72px;left:50%;transform:translateX(-50%);background:${bg};color:#fff;border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;z-index:500;box-shadow:0 4px 16px rgba(0,0,0,.25);max-width:90%;text-align:center;pointer-events:none`;
  t.textContent=msg; document.body.appendChild(t);
  const d=(dur||2500)-300;
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},d);
}

/* ─── Modal ─── */
function openModal(title,body,sub){
  document.getElementById('modal-title').innerHTML=title;
  document.getElementById('modal-sub').innerHTML=sub||'';
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('overlay').style.display='block';
  document.getElementById('overlay').scrollTop=0;
}
function closeModal(){ document.getElementById('overlay').style.display='none'; }
function overlayClick(e){ if(e.target===document.getElementById('overlay'))closeModal(); }

/* ─── Navigation ─── */
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nav-'+tab); if(nb)nb.classList.add('active');
  refreshUI();
}
function refreshUI(){
  const m=document.getElementById('main'); if(!m)return;
  document.getElementById('hdr-count').textContent=orders.filter(o=>!o.isArchived).length+' orders';
  updateBkDot();
  if(currentTab==='home')    m.innerHTML=renderHome();
  else if(currentTab==='orders')  m.innerHTML=renderOrders();
  else if(currentTab==='reports') m.innerHTML=renderReports();
  else if(currentTab==='people')  m.innerHTML=renderPeople();
  else if(currentTab==='more')    m.innerHTML=renderMore();
}

function renderHome(){
  const active=orders.filter(o=>!o.isArchived);
  const pend=active.filter(o=>o.status!=='delivered'&&o.status!=='cancelled'&&o.type!=='stock_order'&&financiallyActive(o));
  return `
    <div style="margin-bottom:16px">
      <div style="font-size:22px;font-weight:800;color:#1c2b36">Hello, Nidhi! 👋</div>
      <div class="t-sm">${active.length} orders · ${vendors.length} vendors · ${customers.length} customers</div>
    </div>
    ${renderOutstanding(active)}
    ${renderFinancials(active)}
    ${renderAttention(pend)}`;
}

/* Cancelled orders are visible but excluded from all financial calculations */
const financiallyActive = o => o.status !== 'cancelled';

function renderOutstanding(active){
  const fin=active.filter(financiallyActive);
  const cRec=customers.map(c=>({...c,due:fin.filter(o=>o.customerId===c.id).reduce((s,o)=>s+cBal(o),0)})).filter(c=>c.due>0).sort((a,b)=>b.due-a.due);
  const vPay=vendors.map(v=>({...v,due:fin.filter(o=>o.vendorId===v.id).reduce((s,o)=>s+vBal(o),0)})).filter(v=>v.due>0).sort((a,b)=>b.due-a.due);
  const tRecv=sum(cRec,'due'), tPay=sum(vPay,'due');
  if(!cRec.length&&!vPay.length) return `<div class="card-nc" style="margin-bottom:10px;text-align:center;padding:18px;background:#e6f5ee"><div style="font-size:24px;margin-bottom:4px">🎉</div><div style="font-weight:700;color:#2a7d52">All accounts clear! No outstanding dues.</div></div>`;
  let h='';
  if(cRec.length){
    h+=`<div class="out-block">
      <div class="obt"><span>💰 Customer Receivables</span><span class="recv fw8" style="font-size:15px">${Rs(tRecv)}</span></div>
      ${cRec.map(c=>`<div class="or" onclick="goCustOrders('${c.id}')">
        <div><div class="on">${esc(c.name)}</div><div class="od">${fin.filter(o=>o.customerId===c.id&&cBal(o)>0).length} order(s) pending</div></div>
        <div class="oa recv">${Rs(c.due)} →</div>
      </div>`).join('')}
    </div>`;}
  if(vPay.length){
    h+=`<div class="out-block">
      <div class="obt"><span>💸 Vendor Payables</span><span class="pay fw8" style="font-size:15px">${Rs(tPay)}</span></div>
      ${vPay.map(v=>`<div class="or" onclick="goVendOrders('${v.id}')">
        <div><div class="on">${esc(v.name)}</div><div class="od">${fin.filter(o=>o.vendorId===v.id&&vBal(o)>0).length} order(s) pending</div></div>
        <div class="oa pay">${Rs(v.due)} →</div>
      </div>`).join('')}
    </div>`;}
  const net=tRecv-tPay;
  h+=`<div class="card-nc" style="background:${net>=0?'#e6f5ee':'#fdecea'};margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:700;color:${net>=0?'#2a7d52':'#c0392b'}">
      <span>Net Position</span>
      <span>${net>=0?'📥 '+Rs(net)+' to receive':'📤 '+Rs(Math.abs(net))+' net payable'}</span>
    </div></div>`;
  return h;
}

function renderFinancials(active){
  const now=new Date();
  let from,to;
  if(dashPeriod==='this_month'){from=new Date(now.getFullYear(),now.getMonth(),1);to=new Date(now.getFullYear(),now.getMonth()+1,0);}
  else if(dashPeriod==='last_month'){from=new Date(now.getFullYear(),now.getMonth()-1,1);to=new Date(now.getFullYear(),now.getMonth(),0);}
  else if(dashPeriod==='fy'){const fy=now.getMonth()>=3?now.getFullYear():now.getFullYear()-1;from=new Date(fy,3,1);to=new Date(fy+1,2,31);}
  else if(dashPeriod==='custom'&&dashCustMon){const[y,m]=dashCustMon.split('-').map(Number);from=new Date(y,m-1,1);to=new Date(y,m,0);}
  else{from=new Date(0);to=new Date(9999,0,1);}

  const inP=active.filter(o=>financiallyActive(o)&&(()=>{const d=new Date(o.orderDate);return d>=from&&d<=to;})());
  const revenue=sum(inP,'customerPrice'), cost=sum(inP,'vendorPrice');
  const expTotal=sum(inP,o=>sum(o.expenses||[],'amount'));
  const profit=revenue-cost-expTotal;
  const custPaid=sum(inP,cPaid), vendPaid=sum(inP,vPaid);
  const cCash=sum(inP.filter(o=>o.customerPaymentMode==='Cash'),cPaid);
  const cUPI =sum(inP.filter(o=>o.customerPaymentMode==='UPI'), cPaid);
  const cOth =custPaid-cCash-cUPI;
  const vCash=sum(inP.filter(o=>o.vendorPaymentMode==='Cash'),vPaid);
  const vUPI =sum(inP.filter(o=>o.vendorPaymentMode==='UPI'), vPaid);
  const vCard=sum(inP.filter(o=>o.vendorPaymentMode==='Card'),vPaid);
  const vOth =vendPaid-vCash-vUPI-vCard;

  const _pkeys=['this_month','last_month','fy','all','custom'];
  const _plbls=[
    MON[now.getMonth()]+' '+now.getFullYear(),
    MON[(now.getMonth()+11)%12]+' '+(now.getMonth()===0?now.getFullYear()-1:now.getFullYear()),
    'FY '+(now.getMonth()>=3?now.getFullYear():now.getFullYear()-1)+'-'+(now.getMonth()>=3?now.getFullYear()+1:now.getFullYear()).toString().slice(-2),
    'All Time',
    dashCustMon?MON[parseInt(dashCustMon.split('-')[1])-1]+' '+dashCustMon.split('-')[0]:'Custom'
  ];
  const plabel=_plbls[_pkeys.indexOf(dashPeriod)]||'All Time';

  const pBtns=[['this_month','This Month'],['last_month','Last Month'],['fy','This FY'],['all','All Time'],['custom','Month ▾']].map(([k,l])=>`<button class="pb${dashPeriod===k?' act':''}" onclick="setDashPeriod('${k}')">${l}</button>`).join('');
  const custIn=dashPeriod==='custom'?`<div class="field" style="margin-bottom:12px"><label class="fl">Select Month</label><input type="month" class="fi" value="${dashCustMon}" onchange="dashCustMon=this.value;refreshUI()" style="max-width:200px"></div>`:'';

  return `<div class="fin-block">
    <div class="fin-t">📊 Financials — ${plabel}</div>
    <div class="period-bar">${pBtns}</div>
    ${custIn}
    <div class="fin-row"><span class="fin-label">📈 Revenue (Sales)</span><span class="fin-val">${Rs(revenue)}</span></div>
    <div class="fin-row"><span class="fin-label">📦 Vendor Cost</span><span class="fin-val t-danger">−${Rs(cost)}</span></div>
    ${expTotal>0?`<div class="fin-row"><span class="fin-label">🧾 Expenses</span><span class="fin-val t-danger">−${Rs(expTotal)}</span></div>`:''}
    <div class="fin-div"></div>
    <div class="fin-profit" style="color:${profit>=0?'#2a7d52':'#c0392b'}">
      <span>${profit>=0?'📈 Net Profit':'📉 Net Loss'}</span><span>${profit>=0?'':'-'}${Rs(Math.abs(profit))}</span>
    </div>
    <div class="fin-div"></div>
    <div style="font-size:11px;font-weight:800;color:#6b8899;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">💰 Collections from Customers</div>
    <div class="fin-row"><span class="fin-label">Total Received</span><span class="fin-val t-success">${Rs(custPaid)}</span></div>
    <div class="mode-box">
      <div class="mb" style="background:#e6f5ee"><div class="mb-lbl">Cash</div><div class="mb-val" style="color:#2a7d52">${Rs(cCash)}</div></div>
      <div class="mb" style="background:#e8f4f8"><div class="mb-lbl">UPI</div><div class="mb-val" style="color:#1a6b8a">${Rs(cUPI)}</div></div>
      ${cOth>0?`<div class="mb" style="background:#eef1f3"><div class="mb-lbl">Other</div><div class="mb-val" style="color:#6b8899">${Rs(cOth)}</div></div>`:''}
    </div>
    <div style="font-size:11px;font-weight:800;color:#6b8899;text-transform:uppercase;letter-spacing:.5px;margin:10px 0 8px">💸 Payments to Vendors</div>
    <div class="fin-row"><span class="fin-label">Total Paid Out</span><span class="fin-val t-danger">${Rs(vendPaid)}</span></div>
    <div class="mode-box">
      <div class="mb" style="background:#fdecea"><div class="mb-lbl">Cash</div><div class="mb-val" style="color:#c0392b">${Rs(vCash)}</div></div>
      <div class="mb" style="background:#e8f4f8"><div class="mb-lbl">UPI</div><div class="mb-val" style="color:#1a6b8a">${Rs(vUPI)}</div></div>
      ${vCard>0?`<div class="mb" style="background:#f0ebff"><div class="mb-lbl">Card</div><div class="mb-val" style="color:#7c3aed">${Rs(vCard)}</div></div>`:''}
      ${vOth>0?`<div class="mb" style="background:#eef1f3"><div class="mb-lbl">Other</div><div class="mb-val" style="color:#6b8899">${Rs(vOth)}</div></div>`:''}
    </div>
    <div class="t-xs" style="text-align:right;margin-top:8px">${inP.length} order(s) in this period</div>
  </div>`;
}

function goVendOrders(vid){oVendF=vid;oCustF='';switchTab('orders');}

function renderOrders(){
  const active=orders.filter(o=>!o.isArchived);
  const months=[...new Set(active.map(o=>o.orderDate?.slice(0,7)).filter(Boolean))].sort().reverse();
  const mLabel=m=>{if(!m)return'All Months';const[y,mo]=m.split('-');return MON[parseInt(mo)-1]+' '+y;};

  let list=active.filter(o=>{
    if(oFilter!=='all'&&o.status!==oFilter)return false;
    if(oMonth&&!o.orderDate?.startsWith(oMonth))return false;
    if(oCustF&&o.customerId!==oCustF)return false;
    if(oVendF&&o.vendorId!==oVendF)return false;
    if(oSearch){const q=oSearch.toLowerCase();return o.productName?.toLowerCase().includes(q)||o.id?.toLowerCase().includes(q)||getC(o.customerId)?.name?.toLowerCase().includes(q)||getV(o.vendorId)?.name?.toLowerCase().includes(q);}
    return true;
  });

  const specF = oCustF||oVendF;
  const specLabel = oCustF?'👤 '+esc(getC(oCustF)?.name||'Customer'):oVendF?'🏪 '+esc(getV(oVendF)?.name||'Vendor'):'';

  const sfBanner=specF?`<div style="background:#e8f4f8;border-radius:10px;padding:8px 12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;color:#1a6b8a">Filtered: ${specLabel}<button onclick="oCustF='';oVendF='';refreshUI()" style="background:none;border:none;color:#c0392b;font-size:20px;cursor:pointer;line-height:1">&times;</button></div>`:'';

  const cards=list.length?list.map(o=>{
    const v=getV(o.vendorId),c=getC(o.customerId),si=stInfo(o),bal=cBal(o),prof=grossP(o);
    const isCancelled=o.status==='cancelled';
    const ph=o.photo?`<img src="${o.photo}" style="width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0;${isCancelled?'opacity:.45':''}">`:'';
    return `<div class="card" onclick="showDetail('${o.id}')" style="${isCancelled?'opacity:.55;background:#f8f8f8':''}">
      <div style="display:flex;gap:10px;align-items:flex-start">
        ${ph}
        <div style="flex:1;min-width:0">
          <div class="fw7" style="font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${isCancelled?'text-decoration:line-through;color:#9aacb5':''}">${esc(o.productName)}</div>
          <div class="t-xs" style="margin:2px 0 5px">${o.id} · ${o.orderDate}${o.size?' · '+esc(o.size):''}</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap">
            ${v?badge('🏪 '+v.name,'b-gray'):''}
            ${c?badge('👤 '+c.name,'b-gray'):o.type==='stock_order'?badge('📦 Stock','b-primary'):''}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;margin-left:4px">
          ${badge(si.l,si.b)}
          ${!isCancelled&&o.customerPrice>0?`<div style="font-size:12px;font-weight:700;color:${prof>=0?'#2a7d52':'#c0392b'}">${prof>=0?'+':''}${Rs(prof)}</div>`:''}
          ${!isCancelled&&bal>0?`<div class="t-xs t-danger fw7">${Rs(bal)} due</div>`:''}
        </div>
      </div></div>`;
  }).join(''):`<div class="empty"><div class="ei">📦</div><div class="et">No orders match</div><div class="es">Try changing filters or search</div></div>`;

  return `<div class="sec-hdr"><div class="title-lg">Orders <span style="font-size:14px;color:#6b8899;font-weight:400">(${active.length})</span></div><button class="btn btn-sm btn-p" onclick="showAddOrder()">+ New</button></div>

    <div class="filter-bar">

}

function statusSheet(id){
  const o=getO(id);if(!o)return;
  const btns=STATUSES.map(s=>`<button class="stat-opt" style="background:${s.bg}" onclick="setStatus('${id}','${s.k}')">${s.l}</button>`).join('');
  openModal('Change Status',`<div class="t-sm" style="margin-bottom:12px">Current: <b>${stInfo(o).l}</b></div>${btns}<button class="btn btn-gray btn-full" onclick="closeModal()">Cancel</button>`,o.productName);
}
function setStatus(id,status){
  const o=getO(id);if(!o)return;
  // Stock Order → Delivered with no customer: prompt to assign
  if(status==='delivered'&&o.type==='stock_order'&&!o.customerId){
    assignStockCustomer(id);return;
  }
  o.status=status;
  if(status==='delivered')o.deliveryStatus='delivered';
  saveOrder(o);closeModal();
  toast('Status updated: '+STATUSES.find(s=>s.k===status).l,'success');
  refreshUI();
}

function assignStockCustomer(id){
  const o=getO(id);if(!o)return;
  const cOpts=`<option value="">— Select Customer —</option>`+customers.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
  const body=`
    <div style="background:#e6f5ee;border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:#2a7d52;font-weight:600">
      ✅ Mark as Delivered — who did you sell this to?
    </div>
    <div class="field"><label class="fl">Sold To *</label><select id="asc-cust" class="fi">${cOpts}</select></div>
    <div class="field"><label class="fl">Selling Price (₹)</label><input type="number" id="asc-price" class="fi" value="${o.customerPrice||''}" placeholder="0"></div>
    <div class="row" style="margin-top:4px">
      <button class="btn btn-ghost btn-full" onclick="closeModal()">Cancel</button>
      <button class="btn btn-success btn-full" onclick="saveStockSale('${id}')">✅ Mark Delivered</button>
    </div>`;
  openModal('📦 Stock Sold To?',body,esc(o.productName));
}

function saveStockSale(id){
  const cid=document.getElementById('asc-cust')?.value;
  if(!cid){alert('Please select a customer.');return;}
  const price=+document.getElementById('asc-price')?.value||0;
  const o=getO(id);if(!o)return;
  o.customerId=cid;
  o.customerPrice=price;
  o.stockStatus='sold';
  o.status='delivered';
  o.deliveryStatus='delivered';
  saveOrder(o);closeModal();
  toast('✅ Delivered & sold to '+getC(cid)?.name,'success',3000);
  refreshUI();
  setTimeout(()=>openLedger(id),400);
}

function archiveOrder(id){
  if(!confirm('Archive this order? It will be hidden from all views.\nYou can restore it later from More → Archive.'))return;
  const o=getO(id);if(!o)return;
  o.isArchived=true;o.archivedAt=today();
  saveOrder(o);closeModal();toast('Order archived','success');refreshUI();
}
function confirmDelete(id){
  const o=getO(id);if(!o)return;
  if(!confirm(`⚠️ Delete "${o.productName}"?\n\nThis CANNOT be undone. Tap OK to permanently delete this order.`))return;
  deleteOrder(id);closeModal();toast('Order deleted','danger');
}

function handlePhoto(input){
  const file=input.files[0];if(!file)return;input.value='';
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const MAX=600;let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const data=canvas.toDataURL('image/jpeg',0.75);
      const pf=document.getElementById('f-photo');if(pf)pf.value=data;
      const pa=document.getElementById('ph-area');if(!pa)return;
      const parent=pa.parentElement;
      parent.innerHTML=`<label class="fl">Product Photo</label><div style="margin-bottom:8px"><img src="${data}" style="width:80px;height:80px;border-radius:10px;object-fit:cover"><br><button type="button" class="btn btn-sm btn-danger" style="margin-top:6px" onclick="clearPh()">🗑️ Remove</button></div><div class="photo-area" id="ph-area" onclick="document.getElementById('photo-input').click()">📷 Change photo</div><input type="hidden" id="f-photo" value="">`;
      document.getElementById('f-photo').value=data;
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function renderReports(){

      <div style="flex:1;background:${td>0?'#fdecea':'#e6f5ee'};border-radius:10px;padding:10px;text-align:center"><div class="t-xs">Outstanding</div><div class="fw8" style="color:${td>0?'#c0392b':'#2a7d52'}">${Rs(td)}</div></div>
    </div>

    ${rows}
    <button class="btn btn-gray btn-full" style="margin-top:8px" onclick="closeModal()">Close</button>`;

function exportData(){
  const data={version:2,exportedAt:new Date().toISOString(),boutique:BOUTIQUE,vendors,customers,orders,categories,settings};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=`SparshBoutique_Backup_${today()}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  localStorage.setItem('sb_last_bk',Date.now().toString());
  lsSet('sb_saves',0);updateBkDot();document.getElementById('bk-banner')?.remove();
  toast('✅ Backup downloaded!','success');
}

function importData(input){
  const file=input.files[0];if(!file)return;input.value='';
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.orders||!Array.isArray(data.orders)){alert('Invalid backup file.');return;}
      const dt=data.exportedAt?new Date(data.exportedAt).toLocaleString():'unknown';
      if(!confirm(`Restore backup from ${dt}?\n\nOrders: ${data.orders.length} · Vendors: ${(data.vendors||[]).length} · Customers: ${(data.customers||[]).length}\n\n⚠️ This will replace ALL current data. Continue?`))return;
      vendors=data.vendors||[];customers=data.customers||[];
      orders=(data.orders||[]).map(migrate);
      categories=data.categories||DEF_CATS;settings=data.settings||{};
      saveVendors();saveCustomers();
      lsSet('sb_orders',orders);orders.forEach(o=>fbSet('orders',o.id,o));
      saveSettings();closeModal();refreshUI();
      toast(`✅ Restored: ${orders.length} orders, ${vendors.length} vendors`,'success',4000);
    }catch(err){alert('Could not read backup file. Is it a valid JSON backup?');}
  };
  reader.readAsText(file);
}

let _importPeopleTemp = null; // temp storage for import modal

function importPeopleData(input){
  const file=input.files[0];if(!file)return;input.value='';
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      const newVend=data.vendors||[];
      const newCust=data.customers||[];
      if(!newVend.length&&!newCust.length){alert('No customer or vendor data found in this file.');return;}
      const dt=data.exportedAt?new Date(data.exportedAt).toLocaleString():'unknown';

      // Store in temp var for modal buttons to access
      _importPeopleTemp={vendors:newVend, customers:newCust};

      const body=`
        <div style="background:#e8f4f8;border-radius:12px;padding:12px 14px;margin-bottom:14px">
          <div class="fw7" style="margin-bottom:4px">📂 Found in file (from ${esc(dt)}):</div>
          <div class="t-sm">👥 Customers: <b>${newCust.length}</b></div>
          <div class="t-sm">🏪 Vendors: <b>${newVend.length}</b></div>
          <div class="t-xs" style="margin-top:6px;color:#6b8899">ℹ️ Orders in the file will be skipped.</div>
        </div>
        <div style="background:#fff3cd;border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:#7d4e00">
          <b>⚡ Merge</b> — adds new people &amp; updates existing ones. Your current data is safe.<br><br>
          <b>🔄 Replace</b> — clears your current customers &amp; vendors and loads from this file.
        </div>
        <div class="row" style="margin-bottom:8px">
          <button class="btn btn-p btn-full" onclick="doImportPeople('merge')">⚡ Merge</button>
          <button class="btn btn-danger btn-full" onclick="doImportPeople('replace')">🔄 Replace</button>
        </div>
        <button class="btn btn-gray btn-full" onclick="closeModal()">Cancel</button>`;
      openModal('📥 Import People',body,'Choose how to import');
    }catch(err){alert('Could not read file. Is it a valid Sparsh BizTrack backup?');}
  };
  reader.readAsText(file);
}

function doImportPeople(mode){
  const d=_importPeopleTemp;if(!d)return;
  const newVend=d.vendors||[], newCust=d.customers||[];
  if(mode==='replace'){
    vendors=newVend;
    customers=newCust;
  } else {
    // Merge: update existing (same ID) or add new
    newVend.forEach(v=>{const i=vendors.findIndex(x=>x.id===v.id);if(i>=0)vendors[i]=v;else vendors.push(v);});
    newCust.forEach(c=>{const i=customers.findIndex(x=>x.id===c.id);if(i>=0)customers[i]=c;else customers.push(c);});
  }
  _importPeopleTemp=null;
  saveVendors();saveCustomers();closeModal();refreshUI();
  toast(`✅ Imported: ${newVend.length} vendors, ${newCust.length} customers (${mode})`,'success',4000);
}

  const defMode=side==='vendor'?'UPI':'Cash';
  const modeOpts=side==='vendor'
    ?VEND_PAY_MODES.map(p=>`<option${p===defMode?' selected':''}>${p}</option>`).join('')
    :CUST_PAY_MODES.map(p=>`<option${p===defMode?' selected':''}>${p}</option>`).join('');

function savePmt(oid, side){
  const o=getO(oid);if(!o)return;
  const amt=+document.getElementById('pf-amt')?.value||0;
  if(!amt||amt<=0){alert('Enter a valid amount');return;}
  const pmt={id:uid('P'),date:document.getElementById('pf-date')?.value||today(),amount:amt,mode:document.getElementById('pf-mode')?.value||'Cash',note:document.getElementById('pf-note')?.value?.trim()||''};
  if(side==='vendor'){
    o.vendorPayments=o.vendorPayments||[];
    o.vendorPayments.push(pmt);
    o.vendorAmountPaid=vPaid(o);
    o.vendorPaymentMode=pmt.mode;
  } else {
    o.customerPayments=o.customerPayments||[];
    o.customerPayments.push(pmt);
    o.customerAmountPaid=cPaid(o);
    o.customerPaymentMode=pmt.mode;
  }
  saveOrder(o);
  toast(side==='vendor'?'Vendor payment saved':'Customer payment saved','success');
  openLedger(oid);
}

function delVPmt(oid,idx){
  if(!confirm('Remove this payment entry?'))return;
  const o=getO(oid);if(!o)return;
  o.vendorPayments=o.vendorPayments||[];
  o.vendorPayments.splice(idx,1);
  o.vendorAmountPaid=vPaid(o);
  saveOrder(o);openLedger(oid);
}
function delCPmt(oid,idx){
  if(!confirm('Remove this payment entry?'))return;
  const o=getO(oid);if(!o)return;
  o.customerPayments=o.customerPayments||[];
  o.customerPayments.splice(idx,1);
  o.customerAmountPaid=cPaid(o);
  saveOrder(o);openLedger(oid);
}

function openLedger(oid){

function renderExpenses(o){
  const exps=o.expenses||[];
  const total=sum(exps,'amount');
  const EXP_TYPES=['Courier','Alteration','Packaging','Misc'];

  const rows=exps.map((e,i)=>`<div class="fin-row">
    <span><b>${esc(e.type)}</b>${e.note?' — '+esc(e.note):''}  <span class="t-xs">${e.date||''}</span></span>
    <span style="display:flex;align-items:center;gap:6px"><b>${Rs(e.amount)}</b>
      <button onclick="delExp('${o.id}',${i})" style="background:none;border:none;color:#c0392b;font-size:16px;cursor:pointer;line-height:1;padding:0">×</button>

  return `<div class="sec" style="background:#f5f0ff;margin-bottom:10px">
    <div class="sec-t" style="color:#7c3aed">🧾 Expenses ${total>0?'— '+Rs(total):''}</div>

}

function addExpForm(oid){
  const o=getO(oid);if(!o)return;
  const EXP_TYPES=['Courier','Alteration','Packaging','Misc'];
  const body=`<div class="sec" style="background:#f5f0ff">
    <div class="sec-t" style="color:#7c3aed">+ New Expense</div>
    <div class="row">
      <div class="col"><div class="field"><label class="fl">Type</label><select id="ef-type" class="fi">${EXP_TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div></div>
      <div class="col"><div class="field"><label class="fl">Amount (₹) *</label><input type="number" id="ef-amt" class="fi" placeholder="0" min="1"></div></div>

function saveExp(oid){
  const o=getO(oid);if(!o)return;

  if(!amt||amt<=0){alert('Enter a valid amount');return;}

  o.expenses=o.expenses||[];
  o.expenses.push(exp);
  saveOrder(o);toast('Expense saved','success');showDetail(oid);
}

function delExp(oid,idx){
  if(!confirm('Remove this expense?'))return;
  const o=getO(oid);if(!o)return;
  o.expenses=o.expenses||[];o.expenses.splice(idx,1);
  saveOrder(o);showDetail(oid);
}

function openExpenses(oid){
  const o=getO(oid);if(!o)return;
  // Expenses are now inline in order detail — just open detail
  showDetail(oid);
}

let reportTab='customers';

function renderVendorReport(){

/* ═══════════════════════════════════════════

const DEF_TEMPLATES={
  placeOrder:`Hi {vendorName}! 🙏\n\nPlease arrange the following order:\n\n📦 *Product:* {product}\n📂 *Category:* {category}\n🔢 *Qty:* {qty}{size}\n👤 *For:* {customerName}\n💰 *Price:* {vendorPrice}\n📅 *Date:* {orderDate}\n\nThank you! 🙏\n— {boutique}`,
  vendorPayment:`Hi {vendorName}! 🙏\n\n*Payment Update*\nProduct: {product}\n💰 Total: {vendorPrice}\n✅ Paid: {vendorPaid}\n{vendorBalance}\n\n— {boutique}`,
  orderDetails:`Hi {customerName}! 😊\n\n*Order Details — Sparsh Boutique*\n📦 {product}{size}{category}\n🔢 Qty: {qty}\n💰 Total: {customerPrice}{customerPaid}{customerBalance}\n\nThank you for shopping with us! 🛍️\n— Nidhi, Sparsh Boutique`,
  paymentReminder:`Hi {customerName}! 😊\n\n*Payment Reminder*\n📦 {product}\n💰 Total: {customerPrice}\n✅ Paid: {customerPaid}\n{customerBalance}\n\nKindly clear the balance at your earliest convenience. 🙏\n\n— Nidhi, Sparsh Boutique`,
  readyDeliver:`Hi {customerName}! 🎉\n\nYour *{product}* is ready for delivery! 📦{size}\n{customerBalance}\n\nPlease let me know a convenient time! 😊\n\n— Nidhi, Sparsh Boutique 🛍️`
};
const TKEYS=['placeOrder','vendorPayment','orderDetails','paymentReminder','readyDeliver'];
const TLABELS={placeOrder:'📩 Place Order to Vendor',vendorPayment:'💸 Vendor Payment Update',orderDetails:'📋 Order Details to Customer',paymentReminder:'💰 Payment Reminder to Customer',readyDeliver:'📦 Ready to Deliver'};

function getTemplates(){return settings.templates||DEF_TEMPLATES;}
function getTpl(key){return getTemplates()[key]||DEF_TEMPLATES[key]||'';}

function fillTpl(tpl,o){
  const v=getV(o.vendorId),c=getC(o.customerId);
  const cp=cPaid(o),cb=cBal(o),vp=vPaid(o),vb=vBal(o);
  return tpl
    .replace(/{vendorName}/g,v?.name||'Vendor')
    .replace(/{customerName}/g,c?.name||'Customer')
    .replace(/{product}/g,o.productName||'')
    .replace(/{category}/g,o.category?` — ${o.category}`:'')
    .replace(/{size}/g,o.size?` (${o.size})`:'')
    .replace(/{qty}/g,String(o.quantity||1))
    .replace(/{vendorPrice}/g,`Rs. ${o.vendorPrice||0}`)
    .replace(/{vendorPaid}/g,`Rs. ${vp}`)
    .replace(/{vendorBalance}/g,vb>0?`⚠️ *Balance Due: Rs. ${vb}*`:'✅ Fully Paid')
    .replace(/{customerPrice}/g,`Rs. ${o.customerPrice||0}`)
    .replace(/{customerPaid}/g,cp>0?`\n✅ Paid: Rs. ${cp}`:'')
    .replace(/{customerBalance}/g,cb>0?`\n⚠️ Balance: Rs. ${cb}`:'\n✅ Fully Paid')
    .replace(/{orderDate}/g,o.orderDate||today())
    .replace(/{boutique}/g,BOUTIQUE);
}

/* Manage WA Templates in More tab */
function showWATemplates(){
  const tpls=getTemplates();
  const rows=TKEYS.map(k=>`<div class="card-nc" style="margin-bottom:8px">
    <div class="rsb" style="margin-bottom:6px">
      <div class="fw7 t-sm">${TLABELS[k]}</div>
      <button class="btn btn-sm btn-ghost" onclick="editTemplate('${k}')">✏️ Edit</button>
    </div>
    <div style="font-size:11px;color:#6b8899;white-space:pre-wrap;max-height:60px;overflow:hidden">${esc((tpls[k]||DEF_TEMPLATES[k]||'').slice(0,120))}…</div>
  </div>`).join('');
  openModal('💬 WhatsApp Templates',rows+`<button class="btn btn-gray btn-full" onclick="closeModal()">Close</button>`,'Tap to edit any template');
}

function editTemplate(key){
  const tpl=getTpl(key);
  const vars=['{vendorName}','{customerName}','{product}','{size}','{qty}','{category}','{vendorPrice}','{vendorPaid}','{vendorBalance}','{customerPrice}','{customerPaid}','{customerBalance}','{orderDate}','{boutique}'];
  const chips=vars.map(v=>`<button onclick="insertVar('${v}')" style="padding:3px 8px;border-radius:8px;border:1px solid #d4e6ed;background:#e8f4f8;font-size:11px;cursor:pointer;font-family:inherit;color:#1a6b8a;margin:2px">${v}</button>`).join('');
  const body=`<div class="field"><label class="fl">${TLABELS[key]}</label>
    <textarea id="tpl-body" class="fi" rows="8" style="font-size:12px;white-space:pre">${esc(tpl)}</textarea>
    <div class="fi-note">Tap a variable to insert it at cursor position:</div>
    <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:2px">${chips}</div>
  </div>
  <div class="row" style="margin-top:4px">
    <button class="btn btn-danger btn-sm" onclick="resetTpl('${key}')">Reset Default</button>
    <button class="btn btn-ghost" onclick="showWATemplates()">Cancel</button>
    <button class="btn btn-p" onclick="saveTpl('${key}')">💾 Save</button>
  </div>`;
  openModal('Edit Template',body,TLABELS[key]);
}
function insertVar(v){
  const ta=document.getElementById('tpl-body');if(!ta)return;
  const s=ta.selectionStart,e=ta.selectionEnd;
  ta.value=ta.value.slice(0,s)+v+ta.value.slice(e);
  ta.selectionStart=ta.selectionEnd=s+v.length;ta.focus();
}
function saveTpl(key){
  const val=document.getElementById('tpl-body')?.value;if(!val)return;
  if(!settings.templates)settings.templates={...DEF_TEMPLATES};
  settings.templates[key]=val;
  saveSettings();toast('Template saved','success');showWATemplates();
}
function resetTpl(key){
  if(!confirm('Reset to default template?'))return;
  if(settings.templates)delete settings.templates[key];
  saveSettings();toast('Reset to default','success');editTemplate(key);
}

/* ─── WhatsApp functions using templates ─── */
function waOpen(phone,msg){
  const p=phone.replace(/\D/g,'');
  window.open('https://wa.me/'+p+(msg?'?text='+encodeURIComponent(msg):''),'_blank');
}

/* Share via Web Share API (mobile) with optional image, fallback to wa.me */
async function waShareWithImage(phone, msg, photoDataUrl){
  // Try Web Share API first (works on Android/iOS Chrome/Safari)
  if(photoDataUrl && navigator.share && navigator.canShare){
    try{
      const res=await fetch(photoDataUrl);
      const blob=await res.blob();
      const file=new File([blob],'order-photo.jpg',{type:'image/jpeg'});
      const shareData={text:msg, files:[file]};
      if(navigator.canShare(shareData)){
        await navigator.share(shareData);
        return; // success — user picked WhatsApp from share sheet
      }
    }catch(e){
      if(e.name==='AbortError')return; // user cancelled share sheet — don't fall through
    }
  }
  // Fallback: open wa.me + toast hint about image
  waOpen(phone, msg);
  if(photoDataUrl){
    toast('💡 Tip: Save the order photo & attach it in WhatsApp manually','info',4500);
  }
}

function waPlaceOrder(id){
  const o=getO(id),v=getV(o.vendorId);
  if(!v?.phone){toast('Vendor has no WhatsApp number','danger');return;}
  waShareWithImage(v.phone, fillTpl(getTpl('placeOrder'),o), o.photo||null);
}
function waVendorPmt(id){
  const o=getO(id),v=getV(o.vendorId);if(!v?.phone)return;
  waShareWithImage(v.phone, fillTpl(getTpl('vendorPayment'),o), o.photo||null);
}
function waOrderDets(id){
  const o=getO(id),c=getC(o.customerId);if(!c?.phone)return;
  waShareWithImage(c.phone, fillTpl(getTpl('orderDetails'),o), o.photo||null);
}
function waCustPmt(id){
  const o=getO(id),c=getC(o.customerId);if(!c?.phone)return;
  waShareWithImage(c.phone, fillTpl(getTpl('paymentReminder'),o), null); // no photo for payment reminders
}
function waReady(id){
  const o=getO(id),c=getC(o.customerId);if(!c?.phone)return;
  waShareWithImage(c.phone, fillTpl(getTpl('readyDeliver'),o), o.photo||null);
}

/* ═══════════════════════════════════════════
   PHASE 2 — AUTO BACKUP (once per day)
═══════════════════════════════════════════ */
function checkDailyBackup(){
  if(useFirebase)return; // Firebase = always synced
  const lastKey='sb_auto_bk_date';
  const todayStr=today();
  const lastBk=localStorage.getItem(lastKey);
  if(lastBk===todayStr)return; // already offered today
  if(!orders.length&&!vendors.length)return; // nothing to back up

  // Show non-intrusive banner after 3 seconds
  setTimeout(()=>{
    if(document.getElementById('bk-banner'))return;
    const b=document.createElement('div'); b.id='bk-banner';
    b.style.cssText='position:fixed;bottom:74px;left:50%;transform:translateX(-50%);width:calc(100% - 20px);max-width:480px;background:#1a6b8a;color:#fff;border-radius:14px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 20px rgba(0,0,0,.25);z-index:200;font-size:13px;font-weight:600;gap:10px';
    b.innerHTML=`<span>☁️ Daily backup reminder</span><div style="display:flex;gap:6px"><button onclick="dailyAutoBackup()" style="background:rgba(255,255,255,.25);border:none;border-radius:8px;padding:5px 10px;color:#fff;font-size:12px;font-weight:700;cursor:pointer">Backup Now</button><button onclick="snoozeBackup()" style="background:rgba(255,255,255,.15);border:none;border-radius:8px;padding:5px 8px;color:#fff;font-size:12px;cursor:pointer">Later</button></div>`;
    document.body.appendChild(b);
  },3000);
}

function dailyAutoBackup(){
  exportData();
  localStorage.setItem('sb_auto_bk_date',today());
  document.getElementById('bk-banner')?.remove();
}
function snoozeBackup(){
  document.getElementById('bk-banner')?.remove();
  // Snooze: remind again in 2 hours by NOT setting the date flag
  // Will re-appear next app open
}
